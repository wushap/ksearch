# ksearch Docker Compose Configuration
# Production-grade stack for self-hosted knowledge base search

services:
  # Vector Database - Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ksearch-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Search Engine - SearXNG
  searxng:
    image: searxng/searxng:latest
    container_name: ksearch-searxng
    ports:
      - "48888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:48888/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change_this_secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Note: For production, configure settings.yml for:
    # - enable_formats: ['json']
    # - safe_search: 0
    # - enable_engines customization

  # Local LLM - Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ksearch-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    # GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]
    #           count: 1

  # Optional: Open WebUI for Ollama management
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ksearch-webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    profiles:
      - webui  # Only start with: docker compose --profile webui up

volumes:
  qdrant_data:
    name: ksearch_qdrant_data
  searxng_data:
    name: ksearch_searxng_data
  ollama_data:
    name: ksearch_ollama_data
  open_webui_data:
    name: ksearch_webui_data

networks:
  default:
    name: ksearch-network